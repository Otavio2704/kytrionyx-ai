services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: openchat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: openchat
      POSTGRES_USER: ollama
      POSTGRES_PASSWORD: ollama123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollama -d openchat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openchat-net

  # ── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openchat-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openchat
      SPRING_DATASOURCE_USERNAME: ollama
      SPRING_DATASOURCE_PASSWORD: ollama123
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - openchat-net

# ── Volumes persistentes ─────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ── Rede interna ─────────────────────────────────────────────────────────────
networks:
  openchat-net:
    driver: bridge